name: Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build free app
    # Only on the canonical repo; forks skip (they lack the toolchain expectations).
    if: github.repository == 'Lange-Co-Consulting/slate'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain
        run: |
          swift --version
          xcodebuild -version
      - name: Build the free app
        run: swift build
