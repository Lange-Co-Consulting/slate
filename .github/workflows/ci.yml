name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    # The native llama/sd frameworks are intentionally not stored in Git. This
    # runner must have them provisioned in the checkout; see README.md.
    runs-on: [self-hosted, macOS, ARM64, slate-native]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Verify
        run: ./Scripts/verify.sh
