name: Feature request
description: Suggest an idea or improvement for Slate.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or frustration behind the idea. What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like Slate to do. Sketches or examples welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.
  - type: checkboxes
    id: scope
    attributes:
      label: Fit
      options:
        - label: This keeps Slate local-first and privacy-respecting.
        - label: This fits Slate's restrained, monochrome design.
